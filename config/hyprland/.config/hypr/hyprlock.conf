background {
    path = ~/.dotfiles/wallpapers/actual
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 2
    disable_loading_bar = false
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(e0e0e0, 0.6)
    inner_color = rgba(ffffff, 0.1)
    font_color = rgba(ffffff, 0.9)
    fade_on_empty = true
    fade_timeout = 800
    placeholder_text = <span foreground="##cdd6f480">Password...</span>
    hide_input = false
    rounding = 12
    check_color = rgba(a6e3a1, 0.8)
    fail_color = rgba(f38ba8, 0.9)
    fail_text = <span foreground="##f38ba8"><b>×</b> $FAIL <span foreground="##f38ba890">($ATTEMPTS)</span></span>
    fail_transition = 400
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false

    position = 0, -80
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(cdd6f4, 0.6)
    font_size = 18
    font_family = JetBrains NF
    position = 0, 160
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(ffffff, 0.85)
    font_size = 110
    font_family = JetBrains Mono NF
    position = 0, 60
    halign = center
    valign = center
}
